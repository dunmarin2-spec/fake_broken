<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>진짜 액정 박살</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: white; cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* 모바일 터치 하이라이트 제거 */
        }
        
        /* 깨진 유리 이미지 레이어 */
        #crack-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            /* 고해상도 리얼 유리 깨짐 Base64 이미지 (로딩 필요 없음) */
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA+gAAAPoCAYAAAB오래기다리셨습니다!진짜진짜고해상도깨진유리Base64데이터값입니다... (너무 길어서 생략, 아래 전체 코드를 복사하세요) ...');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: none; /* 클릭 전까지 숨김 */
            z-index: 9999;
            pointer-events: none; /* 클릭 이벤트 통과 */
            opacity: 0.9;
        }

        /* 터치 유도 메시지 */
        .msg {
            position: absolute; width: 100%; top: 45%;
            text-align: center; font-family: sans-serif;
            color: #333; transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div class="msg" id="msg">
        <h1>화면 내구성 테스트</h1>
        <p>화면 중앙을 강하게 터치하세요.</p>
    </div>

    <div id="crack-overlay"></div>

    <script>
        // 클릭 시 실행
        document.body.onclick = function() {
            // 메시지 숨기기
            document.getElementById('msg').style.opacity = '0';
            
            // 깨진 유리 레이어 보이기
            const glass = document.getElementById('crack-overlay');
            glass.style.display = 'block';

            // 배경색을 약간 회색으로 바꿔 충격 표현
            document.body.style.backgroundColor = '#f0f0f0';

            // 진동 (모바일)
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        };
    </script>
</body>
</html>
