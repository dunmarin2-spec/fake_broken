<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 폰 상태 점검</title>
    <style>
        :root {
            --bg: #f8fafc;
            --kakao: #FEE500;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Pretendard', sans-serif; overflow: hidden;
        }
        /* 메인 화면 (정상적인 앱인 척) */
        .main-ui {
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; background: var(--bg); height: 100%; box-sizing: border-box;
        }
        .card {
            background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%; max-width: 350px; text-align: center; margin-top: 50px;
        }
        .scan-btn {
            background: #3498db; color: white; border: none;
            padding: 20px; width: 100%; border-radius: 15px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
            margin-top: 20px; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* ⚠️ 파손 이미지 (기본 숨김) */
        #crack-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://i.imgur.com/8Yv9jD8.png') no-repeat center;
            background-size: cover; z-index: 9999; pointer-events: none;
        }

        /* 하단 수익 영역 */
        .bottom-area { margin-top: auto; width: 100%; max-width: 350px; padding-bottom: 30px; }
        .support-btn {
            background: var(--kakao); color: #3c1e1e; text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            padding: 15px; border-radius: 12px; font-weight: bold; margin-bottom: 15px;
        }
        .coupang-search-box {
            background: white; border: 1px solid #e2e8f0; border-radius: 1rem;
            padding: 1rem; text-align: center;
        }
        .search-form { display: flex; gap: 5px; margin-top: 10px; }
        .search-input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.8rem; outline: none; }
        .search-button { background: #1e293b; color: white; padding: 0 15px; border-radius: 8px; border: none; font-size: 0.8rem; }
    </style>
</head>
<body onclick="breakScreen()">

    <div class="main-ui">
        <div class="card">
            <h2 style="margin:0;">📱 폰 성능 정밀 진단</h2>
            <p style="color:#64748b; font-size:0.9rem;">액정 센서 및 터치 감도를<br>실시간으로 테스트합니다.</p>
            <button class="scan-btn">터치하여 테스트 시작</button>
        </div>

        <div class="bottom-area">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="support-btn">☕ 장난 성공하면 커피 한 잔 쏘기</a>
            
            <div class="coupang-search-box">
                <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="search-form">
                    <input type="hidden" name="channel" value="AF4757238">
                    <input type="text" name="q" placeholder="액정 필름 / 폰 케이스 검색" class="search-input">
                    <button type="submit" class="search-button">검색</button>
                </form>
                <p style="font-size: 8px; color: #94a3b8; margin-top: 8px;">"이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다."</p>
            </div>
        </div>
    </div>

    <div id="crack-overlay"></div>

    <audio id="break-sound" src="https://www.soundjay.com/misc/sounds/glass-break-1.mp3" preload="auto"></audio>

    <script>
        function breakScreen() {
            const overlay = document.getElementById('crack-overlay');
            const sound = document.getElementById('break-sound');
            
            if (overlay.style.display !== 'block') {
                // 1. 소리 재생
                sound.play();
                // 2. 파손 이미지 노출
                overlay.style.display = 'block';
                // 3. 진동 (모바일 지원 시)
                if (navigator.vibrate) {
                    navigator.vibrate([100, 50, 200]);
                }
            }
        }
    </script>
</body>
</html>
