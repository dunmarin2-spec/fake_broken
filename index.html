<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>액정 박살 시뮬레이터</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; cursor: pointer; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none; }
        .ui { position: absolute; width: 100%; text-align: center; top: 40%; font-family: sans-serif; z-index: 5; }
    </style>
</head>
<body>

    <div class="ui" id="ui">
        <h1 style="color: #ff4444;">⚠️ 시스템 경고 ⚠️</h1>
        <p>화면에 미세한 균열이 감지되었습니다.<br>확인하려면 화면을 터치하세요.</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function drawCrack(x, y) {
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(x, y);

            // 거미줄처럼 퍼지는 금선들 생성
            for (let i = 0; i < 15; i++) {
                let angle = Math.random() * Math.PI * 2;
                let length = Math.random() * (window.innerWidth / 2);
                let curX = x;
                let curY = y;

                for (let j = 0; j < 5; j++) {
                    let nextX = curX + Math.cos(angle) * (length / 5);
                    let nextY = curY + Math.sin(angle) * (length / 5);
                    ctx.lineTo(nextX, nextY);
                    
                    // 금이 꺾이는 효과
                    angle += (Math.random() - 0.5);
                    curX = nextX;
                    curY = nextY;
                }
                ctx.moveTo(x, y);
            }
            ctx.stroke();

            // 유리 조각 잔금 효과
            ctx.lineWidth = 0.5;
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.stroke();
        }

        window.addEventListener('click', (e) => {
            ui.style.display = 'none'; // 메시지 숨기기
            document.body.style.background = '#e0e0e0'; // 화면 색 변함
            drawCrack(e.clientX, e.clientY); // 클릭한 지점부터 금이 감
            
            if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
        });
    </script>
</body>
</html>
