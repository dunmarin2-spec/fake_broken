<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>진짜 액정 박살</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; cursor: pointer; }
        /* 깨진 유리 효과 레이어 */
        .broken-glass {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: none; z-index: 100;
        }
        .msg { position: absolute; width: 100%; top: 45%; text-align: center; font-family: sans-serif; }
    </style>
</head>
<body>

    <div class="msg" id="msg">
        <h2>디스플레이 정밀 진단</h2>
        <p>확인을 위해 화면 중앙을 강하게 누르세요</p>
    </div>

    <div id="glass" class="broken-glass">
        <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%; opacity:0.8;">
            <path d="M500,500 L100,200 M500,500 L900,100 M500,500 L800,800 M500,500 L200,850 M500,500 L50,600 M500,500 L950,550 M500,500 L400,50 M500,500 L600,950" stroke="black" stroke-width="3" fill="none" />
            <path d="M480,480 L520,520 M520,480 L480,520 M500,450 L550,500 L500,550 L450,500 Z" stroke="black" stroke-width="2" fill="none" />
            <circle cx="500" cy="500" r="20" stroke="black" stroke-width="1" fill="rgba(0,0,0,0.1)" />
        </svg>
    </div>

    <script>
        document.body.onclick = function() {
            // 메시지 숨기고 유리 금 보이기
            document.getElementById('msg').style.display = 'none';
            document.getElementById('glass').style.display = 'block';
            document.body.style.background = '#ddd'; // 화면 충격으로 약간 어두워짐

            // 진동 (모바일)
            if (navigator.vibrate) navigator.vibrate(200);
        };
    </script>
</body>
</html>
