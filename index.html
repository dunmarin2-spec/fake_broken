<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>액정 박살 주의</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* 배경을 검정으로 하면 더 리얼합니다 */
            cursor: crosshair;
        }

        /* 깨진 유리 레이어 */
        #crack-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('https://i.imgur.com/8Yv9p8H.png'); /* 깨진 유리 투명 PNG */
            background-size: cover;
            background-position: center;
            display: none; /* 처음엔 숨김 */
            z-index: 9999;
            pointer-events: none; /* 클릭 이벤트가 통과되게 함 */
        }

        .instruction {
            color: white;
            text-align: center;
            font-family: sans-serif;
            margin-top: 45vh;
        }
    </style>
</head>
<body>

    <div id="instruction" class="instruction">
        <h1>화면을 터치하여 테스트를 시작하세요</h1>
    </div>

    <div id="crack-overlay"></div>

    <script>
        document.body.addEventListener('click', function() {
            // 1. 안내 문구 숨기기
            document.getElementById('instruction').style.display = 'none';
            
            // 2. 깨진 이미지 보여주기
            const crack = document.getElementById('crack-overlay');
            crack.style.display = 'block';

            // 3. 진동 효과 (모바일 기기만 해당)
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 200]);
            }

            // 4. (선택사항) 효과음 추가하고 싶다면 아래 주석을 해제하세요.
            /*
            const audio = new Audio('https://www.soundjay.com/mechanical/glass-break-1.mp3');
            audio.play();
            */
        });
    </script>
</body>
</html>
